<div id="zona-formulario-comentario" class="add-comment-form">
    <h4>Deja tu comentario</h4>
    <form id="form-comentario">
        <div class="form-group rating-group">
            <label>Tu valoración:</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="valoracion" value="5" required />
                <label for="star5" title="5 estrellas"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star4" name="valoracion" value="4" />
                <label for="star4" title="4 estrellas"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star3" name="valoracion" value="3" />
                <label for="star3" title="3 estrellas"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star2" name="valoracion" value="2" />
                <label for="star2" title="2 estrellas"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star1" name="valoracion" value="1" />
                <label for="star1" title="1 estrella"><i class="fa-solid fa-star"></i></label>
            </div>
        </div>
        <div class="form-group full-width">
            <label for="comment-text">Tu opinión (máx 250 caracteres):</label>
            <textarea id="comment-text" name="texto" maxlength="250" rows="4" required></textarea>
        </div>
        <div class="form-actions">
            <button type="reset" class="btn-secondary">Limpiar</button>
            <button type="submit" class="btn-primary">Enviar comentario</button>
        </div>
    </form>
</div>
